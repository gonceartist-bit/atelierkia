<script>
/* ---------------- Storage & State ---------------- */
const DEFAULT_DATA = {
  settings: { schoolName: "آموزشگاه هنری بانک محتوا", geminiKey: "", theme: "warm" },
  students: [
    { id: "s1", name: "سارا محمدی", age: 11 },
    { id: "s2", name: "آریا رضایی", age: 13 },
    { id: "s3", name: "هانیه کریمی", age: 14 }
  ],
  artworks: [],
  ideas: [],
  exhibitions: [],
  schedule: [],
  mediaVault: []
};

let DATA = null;
let VIEW = { name: "home", params: {} };
let TOAST_TIMER = null;

/* ---------------- Storage abstraction ----------------
   Inside Claude, window.storage (provided by the artifact host) is used.
   Outside Claude (GitHub Pages, installed PWA, any regular browser) that
   object doesn't exist, so we fall back to a same-shaped IndexedDB store.
   IndexedDB is used instead of localStorage because this app stores
   base64 images, which can quickly exceed localStorage's ~5MB quota. */
const IDB_NAME = 'atelier-store', IDB_STORE = 'kv';
let _idbPromise = null;
function idbOpen(){
  if(_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject)=>{
    if(!('indexedDB' in window)) { reject(new Error('no indexedDB')); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore(IDB_STORE);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return _idbPromise;
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, value){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}

const HAS_CLAUDE_STORAGE = (typeof window !== 'undefined' && !!window.storage && typeof window.storage.get === 'function');

const Store = {
  async get(key){
    if(HAS_CLAUDE_STORAGE){
      try{ return await window.storage.get(key); }catch(e){ /* fall through to local */ }
    }
    try{
      const value = await idbGet(key);
      return value != null ? { key, value } : null;
    }catch(e){
      try{ const v = localStorage.getItem(key); return v!=null ? {key, value:v} : null; }
      catch(e2){ return null; }
    }
  },
  async set(key, value){
    if(HAS_CLAUDE_STORAGE){
      try{ return await window.storage.set(key, value); }catch(e){ /* fall through to local */ }
    }
    try{ await idbSet(key, value); return { key, value }; }
    catch(e){
      try{ localStorage.setItem(key, value); return { key, value }; }
      catch(e2){ console.error('storage error', e2); return null; }
    }
  }
};

async function loadData(){
  try{
    const res = await Store.get('atelier-data');
    DATA = res && res.value ? JSON.parse(res.value) : structuredClone(DEFAULT_DATA);
  }catch(e){
    DATA = structuredClone(DEFAULT_DATA);
  }
  // Guard against older saved data missing newer fields
  DATA = Object.assign({}, structuredClone(DEFAULT_DATA), DATA);
  DATA.settings = Object.assign({}, DEFAULT_DATA.settings, DATA.settings||{});
  applyTheme();
  render();
  registerSW();
  setupInstallPrompt();
}

/* ---------------- Theme system ---------------- */
const THEMES = {
  warm:    { label: "گرم",  colors: ['#F7F4EF','#EDE3D1','#E9C7A8','#C25A3C','#6B6B6B'] },
  neutral: { label: "خنثی", colors: ['#F5F4F2','#E8E6E1','#D9D6CE','#57534B','#726F69'] },
  cool:    { label: "سرد",  colors: ['#F2F5F7','#E3E9EC','#CBD9E3','#3E6B85','#5E6C73'] }
};
function applyTheme(){
  document.documentElement.setAttribute('data-theme', DATA.settings.theme || 'warm');
}
function setTheme(name){
  DATA.settings.theme = name;
  applyTheme();
  saveData();
  render();
}

/* ---------------- Simple line-icon set (monochrome, uses currentColor) ---------------- */

};
function icon(name, size=18){
  return `<svg class="ic" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

async function saveData(){
  try{ await Store.set('atelier-data', JSON.stringify(DATA)); }
  catch(e){ console.error('storage error', e); }
}

function uid(){ return Math.random().toString(36).slice(2,10); }

/* ---------------- PWA: service worker + install prompt ---------------- */
function registerSW(){
  if('serviceWorker' in navigator){
    // sw.js only exists when this app is deployed as static files (e.g. GitHub Pages).
    // Inside the Claude artifact sandbox this file won't be found, which is fine - it just no-ops.
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* not available in this environment, ignore */ });
  }
}
let DEFERRED_INSTALL_PROMPT = null;
function setupInstallPrompt(){
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    DEFERRED_INSTALL_PROMPT = e;
  });
}
async function triggerInstall(){
  if(!DEFERRED_INSTALL_PROMPT){ toast('برای نصب: از منوی مرورگر گزینه «افزودن به صفحه اصلی» را بزن'); return; }
  DEFERRED_INSTALL_PROMPT.prompt();
  await DEFERRED_INSTALL_PROMPT.userChoice;
  DEFERRED_INSTALL_PROMPT = null;
}

/* ---------------- Backup / restore (local storage can be cleared by the OS or browser,
   so a manual JSON export/import is the safety net for this app's data) ---------------- */
async function exportBackup(){
  const filename = `atelier-backup-${new Date().toISOString().slice(0,10)}.json`;
  const jsonStr = JSON.stringify(DATA, null, 2);

  // Prefer the native "Save As" folder picker (Chrome/Edge desktop, and some
  // newer Android Chrome builds) so the backup doesn't just fall into the
  // generic Downloads folder mixed with everything else.
  if('showSaveFilePicker' in window){
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'فایل پشتیبان JSON', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(jsonStr);
      await writable.close();
      toast('فایل پشتیبان در پوشه‌ی انتخابی ذخیره شد');
      return;
    }catch(e){
      if(e && e.name === 'AbortError') return; // user cancelled the picker on purpose
      // any other error (unsupported edge case): fall through to legacy download below
    }
  }

  // Fallback for browsers without the File System Access API (Safari, Firefox,
  // most mobile browsers): this can't offer a folder picker, so it lands in
  // the browser's default Downloads location instead.
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  toast('این مرورگر امکان انتخاب پوشه را ندارد؛ فایل در پوشه‌ی Downloads دانلود شد');
}
function importBackupFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed || typeof parsed !== 'object') throw new Error('invalid file');
      if(!confirm('بازیابی این فایل، تمام اطلاعات فعلی اپ را جایگزین می‌کند. ادامه می‌دهی؟')) return;
      DATA = Object.assign({}, structuredClone(DEFAULT_DATA), parsed);
      DATA.settings = Object.assign({}, DEFAULT_DATA.settings, parsed.settings||{});
      applyTheme(); saveData(); render();
      toast('اطلاعات با موفقیت بازیابی شد');
    }catch(err){
      toast('فایل پشتیبان معتبر نیست');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function goto(name, params={}, _fromPop){
  VIEW = { name, params };

    try{
      let safeParams = {};
      try{ safeParams = JSON.parse(JSON.stringify(params)); }catch(e){ safeParams = {}; }
      history.pushState({ name, params: safeParams }, '', '#'+name);
    }catch(e){ /* history API unavailable, ignore */ }
  }
  render(); window.scrollTo(0,0);
}
window.addEventListener('popstate', (e)=>{

/* ---------------- Hybrid AI content generation ---------------- */
function buildAIPrompt(art){
  return `شما دستیار تولید محتوای اینستاگرام برای یک آموزشگاه هنری کودک و نوجوان هستید. لحن باید گرم، صمیمی و فارسی روان باشد.
اطلاعات اثر:
عنوان: ${art.title}
هنرجو: ${art.student || 'نامشخص'} (${art.age || '—'} ساله)
تکنیک: ${art.technique || 'نامشخص'}
موضوع: ${art.subject || 'نامشخص'}

فقط و فقط یک JSON خام (بدون Markdown، بدون توضیح اضافه، بدون \`\`\`) با دقیقاً این ساختار برگردان:
{"caption": "متن کپشن فارسی گرم و صمیمی، حداکثر ۴ خط، با یک یا دو ایموجی مناسب", "hashtags": ["#...", "#...", "#...", "#...", "#..."], "reel_title": "عنوان کوتاه ایده ریلز اینستاگرام", "reel_desc": "توضیح یک یا دو خطی ایده ریلز"}`;
}

function parseAIJson(text){
  const cleaned = text.replace(/```json/gi,'').replace(/```/g,'').trim();
  const start = cleaned.indexOf('{');
  const end = cleaned.lastIndexOf('}');
  if(start===-1 || end===-1) throw new Error('no json found');
  const parsed = JSON.parse(cleaned.slice(start, end+1));
  if(!parsed.caption || !Array.isArray(parsed.hashtags)) throw new Error('invalid shape');
  return {
    caption: parsed.caption,
    hashtags: parsed.hashtags,
    reelTitle: parsed.reel_title || 'ایده ریلز',
    reelDesc: parsed.reel_desc || ''
  };
}

function fetchWithTimeout(url, opts={}, ms=8000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(()=>clearTimeout(t));
}

async function tryClaudeAI(prompt){
  const res = await fetchWithTimeout("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 600,
      messages: [{ role: "user", content: prompt }]
    })
  });
  if(!res.ok) throw new Error('claude api not available');
  const data = await res.json();
  const text = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n');
  return parseAIJson(text);
}

async function tryGeminiAI(prompt){
  const key = DATA.settings.geminiKey;
  if(!key) throw new Error('no gemini key set');
  const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if(!res.ok) throw new Error('gemini api failed');
  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return parseAIJson(text);
}

async function generateAIContent(art){
  const prompt = buildAIPrompt(art);
  // Skip network attempts entirely when offline, so we don't make the user wait on a dead connection.
  if(typeof navigator !== 'undefined' && navigator.onLine === false){
    const tmpl = generateCaption(art);
    const reel = generateReelIdea();
    return { caption: tmpl.caption, hashtags: tmpl.hashtags, reelTitle: reel.title, reelDesc: reel.desc, source: 'template' };
  }
  try{
    const r = await tryClaudeAI(prompt);
    return { ...r, source: 'claude' };
  }catch(e){ /* fall through */ }
  try{
    const r = await tryGeminiAI(prompt);
    return { ...r, source: 'gemini' };
  }catch(e){ /* fall through */ }
  const tmpl = generateCaption(art);
  const reel = generateReelIdea();
  return { caption: tmpl.caption, hashtags: tmpl.hashtags, reelTitle: reel.title, reelDesc: reel.desc, source: 'template' };
}

/* ---------------- Image resize helper ---------------- */
function resizeImage(file, maxW=480){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------------- In-app camera + media vault ---------------- */
/* Uses getUserMedia so photos never touch the device's native gallery/Photos app.
   Captured shots are saved directly into our own mediaVault storage. */
async function openCamera(onCapture){
  const overlay = document.createElement('div');
  overlay.className='sheet-overlay';
  overlay.style.alignItems='center';
  overlay.innerHTML = `
    <div class="sheet" style="border-radius:22px; max-height:90vh; text-align:center">
      <div class="sheet-handle"></div>
      <div style="font-weight:700; margin-bottom:10px">دوربین</div>
      <div id="camWrap" style="border-radius:14px; overflow:hidden; background:#000; position:relative">
        <video id="camVideo" autoplay playsinline style="width:100%; display:block; max-height:50vh"></video>
      </div>
      <div id="camMsg" style="font-size:12.5px; color:var(--gray); margin-top:10px"></div>
      <div style="display:flex; gap:10px; margin-top:14px">
        <button class="btn secondary" id="camCancel">انصراف</button>
        <button class="btn" id="camShoot">📸 ثبت عکس</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const video = overlay.querySelector('#camVideo');
  const msg = overlay.querySelector('#camMsg');
  let stream = null;
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio:false });
    video.srcObject = stream;
  }catch(e){
    msg.textContent = 'دسترسی به دوربین ممکن نشد. مرورگر یا مجوز دوربین را بررسی کن.';
  }

  function cleanup(){
    if(stream) stream.getTracks().forEach(t=>t.stop());
    overlay.remove();
  }
  overlay.querySelector('#camCancel').onclick = cleanup;
  overlay.querySelector('#camShoot').onclick = ()=>{
    if(!stream){ toast('دوربین در دسترس نیست'); return; }
    const canvas = document.createElement('canvas');
    const maxW = 480;
    const scale = Math.min(1, maxW/video.videoWidth);
    canvas.width = video.videoWidth*scale;
    canvas.height = video.videoHeight*scale;
    canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
    cleanup();
    onCapture(dataUrl);
  };
}

      <div class="field"><label class="field-label">موضوع</label><input id="f_subject" placeholder="مثلاً: منظره"></div>
      <div class="field"><label class="field-label">ابعاد</label><input id="f_dim" placeholder="مثلاً: 30x40 cm"></div>
    </div>
    <button class="btn" onclick="saveArtwork()">ثبت اثر</button>
  `;
}

async function handleFileSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  const dataUrl = await resizeImage(file);
  setPendingImage(dataUrl);
}

function setPendingImage(dataUrl){
  PENDING_IMAGE = dataUrl;
  const inner = document.getElementById('uploadInner');
  if(inner) inner.innerHTML = `<img src="${dataUrl}">`;
}

function saveArtwork(){
  const title = document.getElementById('f_title').value.trim();
  const studentSel = document.getElementById('f_student').value;
  const age = document.getElementById('f_age').value;
  const technique = document.getElementById('f_technique').value.trim();
  const subject = document.getElementById('f_subject').value.trim();
  const dim = document.getElementById('f_dim').value.trim();

  if(!title){ toast('لطفاً عنوان اثر را وارد کن'); return; }

  let studentName = '';
  if(studentSel === '__new'){
    studentName = prompt('نام هنرجوی جدید را وارد کن:');
    if(!studentName) { toast('نام هنرجو وارد نشد'); return; }
    const newS = { id: uid(), name: studentName, age: Number(age)||null };
    DATA.students.push(newS);
  } else {
    const s = DATA.students.find(s=>s.id===studentSel);
    studentName = s ? s.name : '';
  }

  const art = {
    id: uid(), title, student: studentName, age: age || '',
    technique, subject, dimensions: dim,
    date: new Date().toISOString().slice(0,10),
    image: PENDING_IMAGE || null,
    status: 'draft', exhibitionSelected: false
  };
  DATA.artworks.push(art);
  saveData();
  toast('اثر با موفقیت ثبت شد');
  goto('artdetail', {id: art.id});
}

/* ---- Content generator (hybrid AI: Claude -> Gemini -> offline template) ---- */
function contentGenView(){
  const art = DATA.artworks.find(a=>a.id===VIEW.params.id);
  if(!art) return emptyState('help','اثر پیدا نشد','');

  if(VIEW.params._loading){
    return `<div class="card" style="text-align:center; padding:40px 16px">
      <div style="display:flex; justify-content:center; color:var(--accent)">${icon('sparkle',28)}</div>
      <div style="margin-top:10px; font-weight:600">در حال تولید محتوا...</div>
      <div style="font-size:12px; color:var(--gray); margin-top:4px">تلاش برای اتصال به هوش مصنوعی</div>
    </div>`;
  }

  if(!VIEW.params._gen){
    VIEW.params._loading = true;
    runGeneration(art);
    return contentGenView();
  }

  const gen = VIEW.params._gen;
  const reel = VIEW.params._reel;
  return `
    <div class="pill active" style="margin-bottom:10px">${sourceLabel(VIEW.params._source)}</div>
    <div class="card">
      <div class="row"><h2 class="section-title" style="margin:0">کپشن پیشنهادی</h2><button class="btn small ghost" onclick="regenerateContent('${art.id}')">${icon('refresh',14)} بازتولید</button></div>
      <textarea rows="7" id="captionText" style="margin-top:8px">${gen.caption}</textarea>
    </div>
    <div class="card">
      <h2 class="section-title">هشتگ‌ها</h2>
      <div>${gen.hashtags.map(h=>`<span class="pill">${h}</span>`).join('')}</div>
    </div>
    <div class="card">
      <h2 class="section-title" style="margin:0 0 6px">ایده ریلز پیشنهادی</h2>
      <div style="font-weight:600">${reel.title}</div>
      <div style="font-size:13px;color:var(--gray);margin-top:4px">${reel.desc}</div>
    </div>
    <button class="btn" onclick="saveIdea('${art.id}')">${icon('bookmark',16)} ذخیره در بانک ایده‌ها</button>
  `;
}

async function runGeneration(art){
  const result = await generateAIContent(art);
  VIEW.params._gen = { caption: result.caption, hashtags: result.hashtags };
  VIEW.params._reel = { title: result.reelTitle, desc: result.reelDesc };
  VIEW.params._source = result.source;
  VIEW.params._loading = false;
  render();
}

function regenerateContent(id){
  VIEW.params._gen = null;
  VIEW.params._loading = true;
  render();
  runGeneration(DATA.artworks.find(a=>a.id===id));
}
function saveIdea(id){
  const art = DATA.artworks.find(a=>a.id===id);
  const caption = document.getElementById('captionText').value;
  DATA.ideas.push({
    id: uid(), artId: id, artTitle: art.title, type:'پست',
    caption, hashtags: VIEW.params._gen.hashtags, reel: VIEW.params._reel,
    createdAt: new Date().toISOString().slice(0,10)
  });
  saveData();
  toast('در بانک ایده‌ها ذخیره شد');
  goto('ideas');
}

      <div style="font-size:12px;color:var(--gray);margin-top:4px">${art.technique||''} ${art.dimensions? '| '+art.dimensions:''}</div>
      <div class="qr">${pseudoQR(art.id)}</div>
      <div style="font-size:11px;color:var(--gray);margin-top:6px">کد اثر: ${art.id.toUpperCase()}</div>
    </div>
    <button class="btn" onclick="window.print()">${icon('print',16)} پیش‌نمایش و چاپ</button>
  `;
}
function pseudoQR(seed){
  let s = 0; for(const c of seed) s += c.charCodeAt(0);
  let rnd = s;
  const next = ()=> (rnd = (rnd*9301+49297)%233280)/233280;
  let rects='';
  for(let y=0;y<8;y++) for(let x=0;x<8;x++){
    if(next()>0.5) rects += `<rect x="${x*14}" y="${y*14}" width="12" height="12" fill="#3A3733"/>`;
  }
  return `<svg viewBox="0 0 112 112" width="100%" height="100%">${rects}</svg>`;
}
